<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roger Page - Lab 4 AWS CLI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #232f3e 0%, #ff9900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(0, 0, 0, 0.55);
      padding: 2.5rem 3rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    h1 { margin: 0 0 0.5rem 0; font-size: 2.2rem; }
    p  { margin: 0.25rem 0; opacity: 0.9; }
    .tag {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.3rem 0.8rem;
      background: #ff9900;
      color: #232f3e;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hola, soy Roger</h1>
    <p>Pagina servida desde Amazon S3</p>
    <p>Laboratorio 4 - AWS CLI</p>
    <span class="tag">S3 + AWS CLI</span>
  </div>
</body>
</html>
